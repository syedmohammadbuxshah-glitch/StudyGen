<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Explorer | StudyGen API Lab</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #eaf0ff; background: #090d18; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top right, #24366e 0, #11172a 35%, #090d18 72%); }
    .shell { max-width: 1180px; margin: 0 auto; padding: 48px 20px 64px; }
    .hero { display: flex; justify-content: space-between; gap: 24px; align-items: end; margin-bottom: 28px; }
    .eyebrow { color: #91a7ff; text-transform: uppercase; letter-spacing: .16em; font-size: 12px; font-weight: 800; }
    h1 { margin: 8px 0 10px; font-size: clamp(36px, 7vw, 68px); line-height: .98; letter-spacing: -.05em; }
    .subtitle { max-width: 650px; color: #aeb8d3; font-size: 17px; line-height: 1.6; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; margin: 28px 0; }
    input { flex: 1 1 300px; min-width: 0; border: 1px solid #2b385c; background: rgba(13, 20, 39, .9); color: white; padding: 15px 17px; border-radius: 14px; font-size: 16px; outline: none; }
    input:focus { border-color: #91a7ff; box-shadow: 0 0 0 3px rgba(145,167,255,.14); }
    button { border: 0; border-radius: 14px; padding: 14px 18px; font-weight: 800; cursor: pointer; color: #0a1020; background: #9eafff; }
    button.secondary { color: #dbe2ff; background: #1a2440; border: 1px solid #2b385c; }
    button:hover { transform: translateY(-1px); }
    .status { min-height: 60px; display: grid; place-items: center; border: 1px solid #263250; border-radius: 16px; background: rgba(10, 16, 31, .55); color: #b9c4df; margin-bottom: 22px; padding: 18px; text-align: center; }
    .spinner { width: 24px; height: 24px; border: 3px solid #34436e; border-top-color: #a8b7ff; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ffb4b4; border-color: #6f3038; background: rgba(74, 22, 31, .45); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card { overflow: hidden; border: 1px solid #263250; border-radius: 18px; background: rgba(16, 24, 46, .82); box-shadow: 0 14px 30px rgba(0,0,0,.16); transition: transform .2s ease, border-color .2s ease; }
    .card:hover { transform: translateY(-4px); border-color: #6678bb; }
    .flag { width: 100%; height: 132px; object-fit: cover; background: #202b48; }
    .content { padding: 16px; }
    .name { font-size: 20px; font-weight: 850; margin: 0 0 8px; }
    .meta { color: #aeb8d3; font-size: 14px; line-height: 1.7; }
    .count { color: #7f8caf; font-size: 13px; margin-bottom: 14px; }
    @media (max-width: 700px) { .hero { display: block; } .hero button { margin-top: 18px; width: 100%; } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="eyebrow">StudyGen · Frontend API Lab</div>
        <h1>Explore the world.</h1>
        <p class="subtitle">A real frontend experience powered by live data from the REST Countries API — with loading, success, search, and friendly error states.</p>
      </div>
      <button class="secondary" id="reloadBtn">↻ Reload data</button>
    </section>

    <div class="controls">
      <input id="searchInput" type="search" placeholder="Search countries by name, region, or capital…" aria-label="Search countries" />
      <button class="secondary" id="errorBtn">Test error state</button>
    </div>

    <div id="status" class="status" aria-live="polite">Preparing live data…</div>
    <div id="count" class="count"></div>
    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <script>
    const API_URL = 'https://restcountries.com/v3.1/all?fields=name,capital,region,population,flags';
    const state = { countries: [], query: '' };
    const statusEl = document.getElementById('status');
    const gridEl = document.getElementById('grid');
    const countEl = document.getElementById('count');
    const searchEl = document.getElementById('searchInput');

    function setStatus(message, type = '') {
      statusEl.className = `status ${type}`;
      statusEl.innerHTML = message;
      statusEl.hidden = false;
    }

    function render() {
      const query = state.query.trim().toLowerCase();
      const filtered = state.countries.filter(country => {
        const name = country.name?.common || '';
        const capital = country.capital?.join(', ') || '';
        const region = country.region || '';
        return `${name} ${capital} ${region}`.toLowerCase().includes(query);
      });

      countEl.textContent = `${filtered.length} ${filtered.length === 1 ? 'country' : 'countries'} shown`;
      gridEl.innerHTML = filtered.map(country => `
        <article class="card">
          <img class="flag" src="${country.flags?.svg || country.flags?.png || ''}" alt="Flag of ${escapeHtml(country.name.common)}" loading="lazy" />
          <div class="content">
            <h2 class="name">${escapeHtml(country.name.common)}</h2>
            <div class="meta">🌍 ${escapeHtml(country.region || 'Unknown region')}<br>🏛️ ${escapeHtml(country.capital?.[0] || 'No capital listed')}<br>👥 ${Number(country.population || 0).toLocaleString()} people</div>
          </div>
        </article>
      `).join('');

      if (!filtered.length) {
        gridEl.innerHTML = '<div class="status">No countries match your search. Try another name, region, or capital.</div>';
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
    }

    async function loadCountries(url = API_URL) {
      setStatus('<div class="spinner"></div><strong>Loading live country data…</strong>');
      gridEl.innerHTML = '';
      countEl.textContent = '';
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Request failed with status ${response.status}`);
        const data = await response.json();
        if (!Array.isArray(data)) throw new Error('Unexpected API response');
        state.countries = data.sort((a, b) => (a.name?.common || '').localeCompare(b.name?.common || ''));
        setStatus('✓ Live data loaded successfully. Search or filter the results below.');
        render();
      } catch (error) {
        setStatus(`⚠️ We couldn't load the country data right now.<br><small>${escapeHtml(error.message || 'Please try again in a moment.')}</small>`, 'error');
        gridEl.innerHTML = '<div class="status error">The app is still running — use <strong>Reload data</strong> to try again.</div>';
      }
    }

    searchEl.addEventListener('input', event => { state.query = event.target.value; render(); });
    document.getElementById('reloadBtn').addEventListener('click', () => loadCountries());
    document.getElementById('errorBtn').addEventListener('click', () => loadCountries('https://restcountries.com/v3.1/this-endpoint-does-not-exist'));
    loadCountries();
  </script>
</body>
</html>
